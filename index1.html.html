<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة مستر محمد رضا - بوابة الطلاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شاشة تسجيل الدخول */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        .logo-box {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }

        .login-card h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #f1f5f9;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
        }

        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* شاشة المحتوى للطالب */
        #student-dashboard {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 30px 20px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .header-bar h2 {
            color: #38bdf8;
            font-size: 22px;
        }

        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .section-title {
            font-size: 20px;
            color: #f1f5f9;
            margin: 25px 0 15px;
            border-right: 4px solid #3b82f6;
            padding-right: 10px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card-item {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .media-preview {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .link-card {
            display: block;
            background: #0f172a;
            color: #38bdf8;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 8px;
            border: 1px solid #334155;
            transition: background 0.2s;
        }

        .link-card:hover {
            background: #1e293b;
        }
    </style>
</head>
<body>

    <!-- 1. واجهة تسجيل الدخول للطالب -->
    <div id="login-screen">
        <div class="login-card">
            <div class="logo-box">MR</div>
            <h2>منصة مستر محمد رضا</h2>
            <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">دخول الطلاب</p>
            
            <input type="text" id="student-username" placeholder="اسم المستخدم">
            <input type="password" id="student-password" placeholder="كلمة المرور">
            <button class="btn-login" onclick="loginStudent()">تسجيل الدخول</button>
            <div id="error-message" class="error-msg">اسم المستخدم أو كلمة المرور غير صحيحة!</div>
        </div>
    </div>

    <!-- 2. محتوى المنصة للطالب -->
    <div id="student-dashboard">
        <div class="header-bar">
            <h2>مرحباً بك يا <span id="student-name-display" style="color: #fff;"></span> 👋</h2>
            <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
        </div>

        <!-- قسم المنشورات -->
        <div class="section-title">📌 المنشورات والتعليمات</div>
        <div id="student-posts" class="content-grid"></div>

        <!-- قسم الفيديوهات -->
        <div class="section-title">🎥 المحاضرات والفيديوهات</div>
        <div id="student-videos" class="content-grid"></div>

        <!-- قسم الصور -->
        <div class="section-title">🖼️ الصور والملخصات</div>
        <div id="student-images" class="content-grid"></div>

        <!-- قسم اللينكات -->
        <div class="section-title">🔗 الروابط الهامة</div>
        <div id="student-links"></div>
    </div>

    <script>
        function loginStudent() {
            const userIn = document.getElementById('student-username').value.trim();
            const passIn = document.getElementById('student-password').value.trim();
            const errorMsg = document.getElementById('error-message');

            // جلب قائمة المستخدمين المسجلة في موقع المالك
            const usersData = JSON.parse(localStorage.getItem('mr_users') || '[]');

            // التحقق من صحة اسم المستخدم وكلمة المرور
            const foundUser = usersData.find(u => u.username === userIn && u.password === passIn);

            if (foundUser) {
                errorMsg.style.display = 'none';
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('student-dashboard').style.display = 'block';
                document.getElementById('student-name-display').innerText = foundUser.username;
                
                // تحميل المحتوى المرفوع من المستر
                loadStudentContent();
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('student-dashboard').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('student-username').value = '';
            document.getElementById('student-password').value = '';
        }

        function loadStudentContent() {
            // 1. تحميل المنشورات
            const posts = JSON.parse(localStorage.getItem('mr_posts') || '[]');
            const postsContainer = document.getElementById('student-posts');
            postsContainer.innerHTML = posts.length ? '' : '<p style="color:#94a3b8">لا يوجد منشورات حالياً.</p>';
            posts.forEach(p => {
                postsContainer.innerHTML += `
                    <div class="card-item">
                        <p style="font-size: ${p.size}; color: ${p.color}; word-break: break-word;">${p.text}</p>
                    </div>
                `;
            });

            // 2. تحميل الفيديوهات
            const videos = JSON.parse(localStorage.getItem('mr_videos') || '[]');
            const videosContainer = document.getElementById('student-videos');
            videosContainer.innerHTML = videos.length ? '' : '<p style="color:#94a3b8">لا يوجد فيديوهات حالياً.</p>';
            videos.forEach(v => {
                videosContainer.innerHTML += `
                    <div class="card-item">
                        <video src="${v}" controls class="media-preview"></video>
                    </div>
                `;
            });

            // 3. تحميل الصور
            const images = JSON.parse(localStorage.getItem('mr_images') || '[]');
            const imagesContainer = document.getElementById('student-images');
            imagesContainer.innerHTML = images.length ? '' : '<p style="color:#94a3b8">لا يوجد صور حالياً.</p>';
            images.forEach(img => {
                imagesContainer.innerHTML += `
                    <div class="card-item">
                        <img src="${img}" class="media-preview">
                    </div>
                `;
            });

            // 4. تحميل اللينكات
            const links = JSON.parse(localStorage.getItem('mr_links') || '[]');
            const linksContainer = document.getElementById('student-links');
            linksContainer.innerHTML = links.length ? '' : '<p style="color:#94a3b8">لا يوجد روابط حالياً.</p>';
            links.forEach(l => {
                linksContainer.innerHTML += `
                    <a href="${l.url}" target="_blank" class="link-card">🔗 ${l.title}</a>
                `;
            });
        }
    </script>
</body>
</html>
